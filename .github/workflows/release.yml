name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (example: v1.2.3)"
        required: true
      make_latest:
        description: "Mark this release as latest"
        required: true
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-14

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Verify Swift version
        run: swift --version

      - name: Validate version input
        env:
          VERSION: ${{ inputs.version }}
        run: |
          if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Version must match vMAJOR.MINOR.PATCH or prerelease format (example: v1.2.3 or v1.2.3-alpha.1)"
            exit 1
          fi

      - name: Ensure tag exists on remote
        env:
          VERSION: ${{ inputs.version }}
        run: |
          if git rev-parse "$VERSION" >/dev/null 2>&1; then
            echo "Tag $VERSION already exists"
          else
            git tag "$VERSION"
            git push origin "$VERSION"
          fi

      - name: Install build dependency
        run: brew install libusb

      - name: Build and package app bundle
        env:
          VERSION: ${{ inputs.version }}
        run: |
          swift build -c release --product SWizard
          BIN_PATH=$(swift build -c release --show-bin-path)

          if [[ ! -f "$BIN_PATH/SWizard" ]]; then
            echo "Expected binary not found at $BIN_PATH/SWizard"
            ls -la "$BIN_PATH"
            exit 1
          fi

          APP_VERSION=${VERSION#v}
          APP_DIR="dist/SWizard.app"
          PACKAGE_DIR="dist/SWizard-${VERSION}"
          CONTENTS_DIR="$APP_DIR/Contents"
          MACOS_DIR="$CONTENTS_DIR/MacOS"
          RESOURCES_DIR="$CONTENTS_DIR/Resources"
          ICON_SOURCE="Assets/SWizard.icns"

          rm -rf "$APP_DIR"
          mkdir -p "$MACOS_DIR" "$RESOURCES_DIR"
          cp "$BIN_PATH/SWizard" "$MACOS_DIR/SWizard"
          chmod +x "$MACOS_DIR/SWizard"

          if [[ -f "$ICON_SOURCE" ]]; then
            cp "$ICON_SOURCE" "$RESOURCES_DIR/SWizard.icns"
          fi

          cat > "$CONTENTS_DIR/Info.plist" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>SWizard</string>
              <key>CFBundleIdentifier</key>
              <string>com.swizard.app</string>
              <key>CFBundleName</key>
              <string>SWizard</string>
              <key>CFBundleDisplayName</key>
              <string>SWizard</string>
              <key>CFBundleIconFile</key>
              <string>SWizard.icns</string>
              <key>CFBundleVersion</key>
              <string>$APP_VERSION</string>
              <key>CFBundleShortVersionString</key>
              <string>$APP_VERSION</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>LSMinimumSystemVersion</key>
              <string>15.0</string>
              <key>CFBundleSupportedPlatforms</key>
              <array>
                  <string>MacOSX</string>
              </array>
              <key>NSHighResolutionCapable</key>
              <true/>
              <key>LSApplicationCategoryType</key>
              <string>public.app-category.utilities</string>
          </dict>
          </plist>
          PLIST

          rm -rf "$PACKAGE_DIR"
          mkdir -p "$PACKAGE_DIR"
          mv "$APP_DIR" "$PACKAGE_DIR/SWizard.app"
          ditto -c -k --sequesterRsrc --keepParent "$PACKAGE_DIR" "SWizard-${VERSION}-macos-arm64.zip"

      - name: Generate release notes
        env:
          VERSION: ${{ inputs.version }}
        run: |
          cat > RELEASE_NOTES.md <<EOF
          ## SWizard ${VERSION}

          Alpha release of SWizard for Nintendo Switch DBI backend installs.

          ### Download
          - Use \`SWizard-${VERSION}-macos-arm64.zip\`
          - Unzip the archive
          - Install and open from Terminal:
            \`ditto "$HOME/Downloads/SWizard-${VERSION}/SWizard.app" "/Applications/SWizard.app" && xattr -dr com.apple.quarantine "/Applications/SWizard.app" && open "/Applications/SWizard.app"\`

          ### How to use
          1. On Switch DBI, select **Run DBI backend**
          2. Connect USB to Mac and open SWizard from Applications
          3. Drag your NSP/NSZ/XCI/XCZ files and click **Install**

          ### Notes
          - This hobby alpha build is unsigned/not notarized
          - Right-click Open may still be blocked on some systems; use the Terminal install command above
          EOF

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          name: SWizard ${{ inputs.version }}
          body_path: RELEASE_NOTES.md
          prerelease: ${{ contains(inputs.version, '-') }}
          make_latest: ${{ inputs.make_latest }}
          files: SWizard-${{ inputs.version }}-macos-arm64.zip
